<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Browser File Storage</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.5;
        }

        h1 { text-align: center; color: #111827; }

        /* Card Styling */
        .card {
            background: var(--card);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        /* Upload Section */
        .upload-area {
            display: flex;
            gap: 1rem;
            align-items: center;
            border: 2px dashed #e5e7eb;
            padding: 2rem;
            border-radius: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-danger { background-color: var(--danger); color: white; font-size: 0.875rem; }
        .btn-download { background-color: #059669; color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.875rem; display: inline-block; }

        /* File List */
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .file-item:last-child { border-bottom: none; }

        .file-info {
            display: flex;
            flex-direction: column;
        }

        .file-name { font-weight: 600; }
        .file-meta { font-size: 0.85rem; color: #6b7280; }

        .actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        #status {
            text-align: center;
            font-size: 0.9rem;
            height: 1.5rem;
            margin-top: 0.5rem;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <h1>Browser File Vault</h1>

    <div class="card">
        <h3>Upload File</h3>
        <div class="upload-area">
            <input type="file" id="fileInput">
            <button class="btn-primary" onclick="handleUpload()">Save to Storage</button>
        </div>
        <div id="status"></div>
    </div>

    <div class="card">
        <h3>Stored Files</h3>
        <ul id="fileList" class="file-list">
            <li style="text-align:center; color:#888;">Loading files...</li>
        </ul>
    </div>

    <script>
        const DB_NAME = 'LocalFileStorageDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'files';
        let db;

        // 1. Initialize IndexedDB
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
            db = event.target.result;
            // Create an object store that uses 'id' as the key
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            console.log('Database opened successfully');
            loadFiles();
        };

        request.onerror = (event) => {
            console.error('Database error:', event.target.errorCode);
            showStatus('Error opening database', true);
        };

        // 2. Handle File Upload
        function handleUpload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                showStatus('Please select a file first.');
                return;
            }

            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);

            // Store the file object directly (IndexedDB supports Blobs/Files)
            const fileRecord = {
                name: file.name,
                type: file.type,
                size: file.size,
                created: new Date(),
                data: file
            };

            const addRequest = store.add(fileRecord);

            addRequest.onsuccess = () => {
                showStatus(`Saved "${file.name}" successfully!`);
                fileInput.value = ''; // Reset input
                loadFiles(); // Refresh list
            };

            addRequest.onerror = () => {
                showStatus('Error saving file. It might be too large for this browser.', true);
            };
        }

        // 3. Load and Display Files
        function loadFiles() {
            const listElement = document.getElementById('fileList');
            listElement.innerHTML = ''; // Clear current list

            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const cursorRequest = store.openCursor();

            let hasFiles = false;

            cursorRequest.onsuccess = (event) => {
                const cursor = event.target.result;

                if (cursor) {
                    hasFiles = true;
                    renderFileItem(cursor.value, cursor.key, listElement);
                    cursor.continue();
                } else {
                    if (!hasFiles) {
                        listElement.innerHTML = '<li style="text-align:center; padding:1rem; color:#888;">No files stored yet.</li>';
                    }
                }
            };
        }

        // 4. Render a single file item (UI)
        function renderFileItem(fileRecord, id, container) {
            const li = document.createElement('li');
            li.className = 'file-item';

            // Create a temporary URL for the Blob
            const fileUrl = URL.createObjectURL(fileRecord.data);

            const sizeStr = formatSize(fileRecord.size);
            const dateStr = fileRecord.created.toLocaleDateString() + ' ' + fileRecord.created.toLocaleTimeString();

            li.innerHTML = `
                <div class="file-info">
                    <span class="file-name">${fileRecord.name}</span>
                    <span class="file-meta">${sizeStr} • ${dateStr}</span>
                </div>
                <div class="actions">
                    <a href="${fileUrl}" download="${fileRecord.name}" class="btn-download">Download</a>
                    <button class="btn-danger" onclick="deleteFile(${id})">Delete</button>
                </div>
            `;

            container.appendChild(li);
        }

        // 5. Delete File
        function deleteFile(id) {
            if(!confirm('Are you sure you want to delete this file from storage?')) return;

            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.delete(id);

            transaction.oncomplete = () => {
                loadFiles();
                showStatus('File deleted.');
            };
        }

        // Helper: Format Bytes
        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Helper: Status messages
        function showStatus(msg, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = msg;
            statusEl.style.color = isError ? 'var(--danger)' : 'var(--primary)';
            setTimeout(() => { statusEl.textContent = ''; }, 3000);
        }
    </script>
</body>
</html>
